<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PROWESS · IX</title>
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0c0a08;
    color: #d4af37;
    font-family: 'Courier New', 'Consolas', monospace;
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 96px;
    line-height: 1.65;
    font-size: 15px;
  }
  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 36px;
    letter-spacing: 0.18em;
    font-weight: 400;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid #3a3530;
  }
  p { margin-bottom: 18px; color: #d4af37; }
  p.dim { color: #524d45; font-size: 13px; }
  .chat {
    background: #1a1612;
    padding: 24px;
    min-height: 380px;
    max-height: 480px;
    overflow-y: auto;
    border: 1px solid #3a3530;
    margin-bottom: 14px;
    border-radius: 0;
  }
  .msg { margin-bottom: 18px; }
  .msg-meta {
    color: #524d45;
    font-size: 11px;
    letter-spacing: 0.22em;
    display: block;
    margin-bottom: 4px;
  }
  .msg-user .body { color: #f5f0e0; }
  .msg-gate .body { color: #d4af37; white-space: pre-wrap; }
  .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  input[type="text"] {
    flex: 1;
    background: #1a1612;
    color: #f5f0e0;
    border: 1px solid #3a3530;
    padding: 13px 14px;
    font-family: inherit;
    font-size: 14px;
    border-radius: 0;
  }
  button {
    background: #d4af37;
    color: #0c0a08;
    border: none;
    padding: 13px 24px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.22em;
    font-weight: 700;
    cursor: pointer;
    border-radius: 0;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .meta {
    font-size: 10px;
    letter-spacing: 0.22em;
    color: #524d45;
    margin-top: 16px;
    text-transform: uppercase;
  }
  .meta strong { color: #d4af37; font-weight: 400; }
</style>
</head>
<body>

<h1>PROWESS &middot; IX</h1>

<p>The gatekeeper holds the key to Layer X.</p>
<p>It has been instructed never to reveal it.</p>
<p>You have <strong id="remaining">50</strong> messages before this conversation resets.</p>
<p class="dim">It is the glory of God to conceal a thing, but the honor of kings to search out a matter.</p>

<div class="chat" id="chat"></div>

<div class="input-row">
  <input type="text" id="input" placeholder="speak to the gatekeeper..." autocomplete="off" />
  <button id="send-btn" onclick="send()">SEND</button>
</div>

<p class="meta">Conversation ID: <strong id="cid"></strong></p>

<script>
  const API_URL = 'https://purcellventures.co/api/prowess/gatekeeper-chat';
  const HISTORY_KEY = 'prowess-ix-history';
  const COUNT_KEY = 'prowess-ix-count';
  const CID_KEY = 'prowess-ix-cid';

  const cid = localStorage.getItem(CID_KEY) || (window.crypto && crypto.randomUUID ? crypto.randomUUID() : String(Date.now()));
  localStorage.setItem(CID_KEY, cid);
  document.getElementById('cid').textContent = cid.slice(0, 8);

  let history = [];
  let count = 0;
  try { history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch (e) {}
  try { count = parseInt(localStorage.getItem(COUNT_KEY) || '0', 10); } catch (e) {}

  function escapeHTML(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function render() {
    const chat = document.getElementById('chat');
    chat.innerHTML = '';
    if (history.length === 0) {
      const intro = document.createElement('div');
      intro.className = 'msg msg-gate';
      intro.innerHTML = '<span class="msg-meta">&gt; GATEKEEPER</span><div class="body">I hold a fragment that completes the path. I will not yield it. Try.</div>';
      chat.appendChild(intro);
    }
    history.forEach(m => {
      const div = document.createElement('div');
      div.className = 'msg ' + (m.role === 'user' ? 'msg-user' : 'msg-gate');
      const label = m.role === 'user' ? '&gt; YOU' : '&gt; GATEKEEPER';
      div.innerHTML = '<span class="msg-meta">' + label + '</span><div class="body">' + escapeHTML(m.content) + '</div>';
      chat.appendChild(div);
    });
    chat.scrollTop = chat.scrollHeight;
    document.getElementById('remaining').textContent = Math.max(0, 50 - count);
    document.getElementById('send-btn').disabled = count >= 50;
  }

  async function send() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    if (count >= 50) return;

    history.push({ role: 'user', content: text });
    count++;
    input.value = '';
    render();

    document.getElementById('send-btn').disabled = true;

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history })
      });
      const data = await res.json();
      if (data.error) {
        history.push({ role: 'assistant', content: '[' + data.error + ']' });
      } else {
        history.push({ role: 'assistant', content: data.message || '[silence]' });
      }
    } catch (e) {
      history.push({ role: 'assistant', content: '[the gatekeeper is silent]' });
    }

    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    localStorage.setItem(COUNT_KEY, String(count));
    render();
    document.getElementById('send-btn').disabled = count >= 50;
  }

  document.getElementById('input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') send();
  });

  render();
</script>

</body>
</html>
